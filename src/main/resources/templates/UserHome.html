<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>Hospital Dashboard</title>

	<th:block th:replace="~{fragments/commonui :: header}"></th:block>

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
	<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
	<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

	<style>
		:root {
			--primary: #2563EB;
		}

		/* ================= BODY ================= */
		body {
			font-family: "Segoe UI", sans-serif;
			background: url('/images/AavyaShah.png') center/cover no-repeat fixed;
			margin: 0;
		}

		/* DARK OVERLAY (INDUSTRY STANDARD) */
		body::before {
			content: "";
			position: fixed;
			inset: 0;
			background: rgba(0, 0, 0, .25);
			z-index: -1;
		}

		/* ================= SIDEBAR ================= */
		.sidebar {
			position: fixed;
			top: 70px;
			left: 0;
			width: 250px;
			height: calc(100vh - 70px);
			background: rgba(255, 255, 255, .85);
			backdrop-filter: blur(12px);
			border-right: 1px solid #e5e7eb;
			padding: 15px;
			overflow-y: auto;
		}

		.sidebar a {
			display: flex;
			align-items: center;
			gap: 12px;
			padding: 12px 16px;
			margin-bottom: 6px;
			border-radius: 10px;
			text-decoration: none;
			color: #475569;
			font-weight: 500;
		}

		.sidebar a:hover {
			background: #EFF6FF;
			color: var(--primary);
		}

		.sidebar a.active {
			background: var(--primary);
			color: #fff;
		}

		/* ================= CONTENT ================= */
		.content {
			margin-left: 250px;
			margin-top: 70px;
			padding: 25px;
		}

		/* ================= CARDS ================= */
		.card-modern {
			background: rgba(255, 255, 255, .9);
			backdrop-filter: blur(10px);
			border-radius: 16px;
			padding: 18px;
			box-shadow: 0 6px 20px rgba(0, 0, 0, .08);
			transition: .3s;
		}

		.card-modern:hover {
			transform: translateY(-5px);
		}

		.card-link {
			text-decoration: none;
			color: inherit;
		}

		.card-icon {
			width: 45px;
			height: 45px;
			border-radius: 10px;
			display: flex;
			align-items: center;
			justify-content: center;
			color: #fff;
		}

		.bg-blue {
			background: #2563EB;
		}

		.bg-green {
			background: #16A34A;
		}

		.bg-purple {
			background: #7C3AED;
		}

		.bg-orange {
			background: #F59E0B;
		}

		.section-card {
			background: rgba(255, 255, 255, .9);
			backdrop-filter: blur(12px);
			border-radius: 16px;
			padding: 20px;
			box-shadow: 0 6px 20px rgba(0, 0, 0, .08);
		}

		/* ================= RESPONSIVE ================= */
		@media(max-width:992px) {
			.sidebar {
				position: relative;
				width: 100%;
				height: auto;
			}

			.content {
				margin-left: 0;
			}
		}
	</style>
</head>

<body>

	<div th:replace="~{fragments/commonui :: menu}"></div>

	<!-- ================= SIDEBAR ================= -->
	<div class="sidebar">

		<a th:href="@{/slots/dashboard}" class="active">
			<i class="fa fa-house"></i> Dashboard
		</a>

		<a th:href="@{/doctor/all}">
			<i class="fa fa-user-doctor"></i> Doctors
		</a>

		<a th:href="@{/patient/all}">
			<i class="fa fa-user"></i> Patients
		</a>

		<a th:href="@{/appointment/all}">
			<i class="fa fa-calendar"></i> Appointments
		</a>

		<a th:href="@{/beds}">
			<i class="fa fa-bed"></i> Beds
		</a>

	</div>

	<!-- ================= CONTENT ================= -->
	<div class="content">

		<h4 class="fw-bold mb-4 text-white">Dashboard</h4>

		<!-- KPI -->
		<div class="row g-4 mb-4">

			<div class="col-lg-3">
				<a th:href="@{/doctor/all}" class="card-link">
					<div class="card-modern d-flex justify-content-between">
						<div>
							<small>Total Doctors</small>
							<h5 th:text="${doctorCount} ?: 0">0</h5>
						</div>
						<div class="card-icon bg-blue">
							<i class="fa fa-user-doctor"></i>
						</div>
					</div>
				</a>
			</div>

			<div class="col-lg-3">
				<a th:href="@{/patient/all}" class="card-link">
					<div class="card-modern d-flex justify-content-between">
						<div>
							<small>Patients</small>
							<h5 th:text="${patientCount} ?: 0">0</h5>
						</div>
						<div class="card-icon bg-green">
							<i class="fa fa-user"></i>
						</div>
					</div>
				</a>
			</div>

			<div class="col-lg-3">
				<a th:href="@{/appointment/all}" class="card-link">
					<div class="card-modern d-flex justify-content-between">
						<div>
							<small>Appointments</small>
							<h5 th:text="${appointmentCount} ?: 0">0</h5>
						</div>
						<div class="card-icon bg-purple">
							<i class="fa fa-calendar"></i>
						</div>
					</div>
				</a>
			</div>

			<div class="col-lg-3">
				<a th:href="@{/beds}" class="card-link">
					<div class="card-modern d-flex justify-content-between">
						<div>
							<small>Beds</small>
							<h5 th:text="${bedCount} ?: 0">0</h5>
						</div>
						<div class="card-icon bg-orange">
							<i class="fa fa-bed"></i>
						</div>
					</div>
				</a>
			</div>

		</div>

		<!-- CHARTS -->
		<div class="row g-4">

			<div class="col-lg-8">
				<div class="section-card">
					<h6>Appointments Overview</h6>
					<canvas id="lineChart"></canvas>
				</div>
			</div>

			<div class="col-lg-4">
				<div class="section-card">
					<h6>Department Distribution</h6>
					<canvas id="donutChart"></canvas>
				</div>
			</div>

		</div>

	</div>

	<!-- ================= CHART JS ================= -->
	<script>

		new Chart(document.getElementById("lineChart"), {
			type: "line",
			data: {
				labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],
				datasets: [{
					label: "Appointments",
					data: [20, 35, 30, 45, 35, 25, 30],
					borderWidth: 2,
					fill: true
				}]
			},
			options: {responsive: true}
		});

		new Chart(document.getElementById("donutChart"), {
			type: "doughnut",
			data: {
				labels: ["Cardiology", "Neurology", "Ortho", "Pediatrics"],
				datasets: [{data: [25, 20, 20, 15]}]
			},
			options: {responsive: true}
		});

	</script>

</body>

</html>
