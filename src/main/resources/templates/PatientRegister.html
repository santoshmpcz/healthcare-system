<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>Patient Registration</title>

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

	<style>
		body {
			background: url('/images/PatientRegistration.jpeg') no-repeat center center fixed;
			background-size: cover;
			font-family: 'Segoe UI', sans-serif;
			position: relative;
		}

		/* DARK OVERLAY */
		body::before {
			content: "";
			position: fixed;
			inset: 0;
			background: rgba(0, 0, 0, 0.45);
			z-index: -1;
		}

		/* MAIN */
		main.container {
			display: flex;
			justify-content: center;
			align-items: flex-start;
			min-height: 100vh;
			padding-top: 120px;
			padding-bottom: 40px;
		}

		/* GLASS CARD */
		.card {
			width: 95%;
			max-width: 1300px;
			border-radius: 20px;
			background: rgba(255, 255, 255, 0.08);
			backdrop-filter: blur(20px);
			box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4);
			border: 1px solid rgba(255, 255, 255, 0.2);
			padding: 25px 0;
		}

		.card-header {
			background: linear-gradient(135deg, #1a1a8f, #3b82f6);
			color: #fff;
			font-size: 22px;
			font-weight: 600;
			text-align: center;
			padding: 15px;
			border-radius: 12px;
			margin: 0 30px 25px 30px;
		}

		label {
			font-weight: 600;
			font-size: 13px;
			color: #fff;
		}

		/* 🔥 FULLY TRANSPARENT INPUT */
		.form-control,
		.form-select {
			background: transparent !important;
			border: 1px solid rgba(255, 255, 255, 0.4);
			color: #fff;
			border-radius: 10px;
			height: 42px;
			font-size: 14px;
			backdrop-filter: blur(10px);
		}

		textarea.form-control {
			height: auto;
		}

		/* Placeholder */
		.form-control::placeholder {
			color: rgba(255, 255, 255, 0.7);
		}

		/* Focus Effect */
		.form-control:focus,
		.form-select:focus {
			border-color: #3b82f6;
			box-shadow: 0 0 10px rgba(59, 130, 246, 0.6);
			background: transparent;
			color: #fff;
		}

		/* 🔥 DROPDOWN FIX */
		.form-select option {
			color: #000;
			background-color: #fff;
		}

		/* Buttons */
		.btn-equal {
			width: 120px;
		}

		input[type="date"]::-webkit-calendar-picker-indicator {
			filter: invert(1);
		}

		/* SUCCESS */
		.success-alert {
			background: linear-gradient(135deg, #00c853, #00e676);
			color: #fff;
			font-weight: 600;
			border-radius: 16px;
			padding: 16px;
			text-align: center;
		}
	</style>
</head>

<body>

	
	<main class="container">

		<div class="card">

			<div class="card-header">
				Patient Registration
			</div>

			<div class="card-body">

				<div th:if="${successMessage}" id="successMsg" class="success-alert">
					<span th:text="${successMessage}"></span>
				</div>

				<form th:action="@{/patient/save}" th:object="${patient}" method="post">

					<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

					<div class="row g-3">
						<div class="col-md-3">
							<label>First Name</label>
							<input type="text" th:field="*{firstName}" class="form-control"
								placeholder="Enter First Name">
						</div>

						<div class="col-md-3">
							<label>Middle Name</label>
							<input type="text" th:field="*{middleName}" class="form-control"
								placeholder="Enter Middle Name">
						</div>

						<div class="col-md-3">
							<label>Last Name</label>
							<input type="text" th:field="*{lastName}" class="form-control"
								placeholder="Enter Last Name">
						</div>

						<div class="col-md-3">
							<label>Gender</label>
							<select th:field="*{gender}" class="form-select">
								<option value="">Select Gender</option>
								<option value="Male">Male</option>
								<option value="Female">Female</option>
								<option value="Other">Other</option>
							</select>
						</div>

						<div class="col-md-3">
							<label>Date of Birth</label>
							<input type="date" th:field="*{dateOfBirth}" class="form-control"
								placeholder="Select Date of Birth">
						</div>

						<div class="col-md-3">
							<label>Marital Status</label>
							<select th:field="*{maritalStatus}" class="form-select">
								<option value="">Select Marital Status</option>
								<option value="Single">Single</option>
								<option value="Married">Married</option>
							</select>
						</div>

						<div class="col-md-3">
							<label>Aadhaar</label>
							<input type="text" th:field="*{aadhaarNo}" class="form-control"
								placeholder="Enter 12-digit Aadhaar Number">
						</div>

						<div class="col-md-3">
							<label>Blood Group</label>
							<select th:field="*{bloodGroup}" class="form-select">
								<option value="">Select Blood Group</option>
								<option value="A+">A+</option>
								<option value="A-">A-</option>
								<option value="B+">B+</option>
								<option value="B-">B-</option>
								<option value="AB+">AB+</option>
								<option value="AB-">AB-</option>
								<option value="O+">O+</option>
								<option value="O-">O-</option>

							</select>
						</div>

						<div class="col-md-3">
							<label>Nationality</label>
							<input type="text" th:field="*{nationality}" class="form-control"
								placeholder="Enter Nationality">
						</div>

						<div class="col-md-3">
							<label>Mobile</label>
							<input type="text" th:field="*{mobileNo}" class="form-control"
								placeholder="Enter Mobile Number">
						</div>

						<div class="col-md-3">
							<label>Email</label>
							<input type="email" th:field="*{email}" class="form-control"
								placeholder="Enter Email Address">
						</div>

						<div class="col-md-3">
							<label>Religion</label>
							<input type="text" th:field="*{religion}" class="form-control" placeholder="Enter Religion">
						</div>

						<div class="col-md-3">
							<label>Diseases</label>
							<input type="text" th:field="*{diseases}" class="form-control"
								placeholder="Enter Diseases (if any)">
						</div>

						<div class="col-md-3">
							<label>Medical History</label>
							<select th:field="*{medicalHistory}" class="form-select">
								<option value="">Select Medical History</option>

								<!-- Common Conditions -->
								<option value="Diabetes">Diabetes</option>
								<option value="Hypertension">Hypertension (BP)</option>
								<option value="Asthma">Asthma</option>
								<option value="Heart Disease">Heart Disease</option>
								<option value="Kidney Disease">Kidney Disease</option>
								<option value="Liver Disease">Liver Disease</option>

								<!-- Serious Conditions -->
								<option value="Cancer">Cancer</option>
								<option value="Stroke">Stroke</option>
								<option value="Thyroid Disorder">Thyroid Disorder</option>

								<!-- Lifestyle / Chronic -->
								<option value="Obesity">Obesity</option>
								<option value="Allergy">Allergy</option>
								<option value="Arthritis">Arthritis</option>

								<!-- Infectious -->
								<option value="Tuberculosis">Tuberculosis (TB)</option>
								<option value="Hepatitis">Hepatitis</option>
								<option value="HIV">HIV</option>

								<!-- Other -->
								<option value="None">None</option>
								<option value="Other">Other</option>
							</select>
						</div>

						<div class="col-md-3">
							<label>History</label>
							<input type="text" th:field="*{history}" class="form-control"
								placeholder="Enter Medical History Details">
						</div>

						<div class="col-md-3">
							<label>Ward No</label>
							<input type="number" th:field="*{wardNo}" class="form-control"
								placeholder="Enter Ward Number">
						</div>

						<div class="col-md-3">
							<label>Room No</label>
							<input type="number" th:field="*{roomNo}" class="form-control"
								placeholder="Enter Room Number">
						</div>

						<div class="col-md-3">
							<label>Bill Amount</label>
							<input type="number" step="0.01" th:field="*{billAmount}" class="form-control"
								placeholder="Enter Bill Amount">
						</div>

						<div class="col-md-3">
							<label>Note</label>
							<input type="text" th:field="*{note}" class="form-control" placeholder="Enter Notes">
						</div>

						<div class="col-md-3">
							<label>Address</label>
							<textarea th:field="*{address}" class="form-control"
								placeholder="Enter Full Address"></textarea>
						</div>

						<div class="col-md-3">
							<label>Block</label>
							<input type="text" th:field="*{block}" class="form-control" placeholder="Enter Block">
						</div>

						<div class="col-md-3">
							<label>District</label>
							<input type="text" th:field="*{district}" class="form-control" placeholder="Enter District">
						</div>

						<div class="col-md-3">
							<label>State</label>
							<input type="text" th:field="*{state}" class="form-control" placeholder="Enter State">
						</div>

						<div class="col-md-3">
							<label>Country</label>
							<input type="text" th:field="*{country}" class="form-control" placeholder="Enter Country">
						</div>

					</div>

			</div>
			<div class="d-flex justify-content-center gap-3 mt-4">
				<button class="btn btn-primary btn-equal">Register</button>
				<button type="reset" class="btn btn-secondary btn-equal">Reset</button>
			</div>

			</form>

		</div>
		</div>
		</div>

		<script>
			setTimeout(() => {
				let msg = document.getElementById("successMsg");
				if (msg) {
					msg.style.transition = "0.5s";
					msg.style.transform = "translateY(-10px)";
					msg.style.opacity = "0";
					setTimeout(() => msg.remove(), 500);
				}
			}, 3000);
		</script>
</body>

</html>
