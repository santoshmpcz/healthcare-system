<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>Patient Registration</title>

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

	<style>
		body {
			background: url('/images/PatientRegistration.jpeg') no-repeat center center fixed;
			background-size: cover;
			font-family: 'Segoe UI', sans-serif;
		}

		/* overlay */
		body::before {
			content: "";
			position: fixed;
			inset: 0;
			background: rgba(0, 0, 0, 0.35);
			z-index: 0;
		}

		.container {
			display: flex;
			justify-content: center;
			align-items: center;
			min-height: 100vh;
			padding-top: 1in;
			padding-bottom: 1in;
		}

		.card {
			width: 95%;
			max-width: 1300px;
			border-radius: 20px;
			background: rgba(255, 255, 255, 0.12);
			backdrop-filter: blur(15px);
			box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
			border: 2px solid #3b82f6;
			padding: 25px 0;
			position: relative;
			z-index: 1;
		}

		.card-header {
			background: linear-gradient(135deg, #1a1a8f, #3b82f6);
			color: #fff;
			font-size: 22px;
			font-weight: 600;
			text-align: center;
			padding: 15px;
			border-radius: 12px;
			margin: 0 30px 25px 30px;
		}

		.card-body {
			padding: 20px 30px;
		}

		/* ✅ LABEL BOLD */
		label {
			font-weight: bold;
			font-size: 13px;
			color: #fff;
		}

		/* ✅ INPUT STYLE */
		.form-control,
		.form-select {
			background: rgba(255, 255, 255, 0.15);
			border: 1px solid rgba(255, 255, 255, 0.3);
			color: #fff;
			border-radius: 10px;
			height: 40px;
			font-size: 14px;
			font-weight: bold;
			backdrop-filter: blur(5px);
		}

		.form-control::placeholder {
			color: rgba(255, 255, 255, 0.7);
		}

		.form-control:focus,
		.form-select:focus {
			border-color: #3b82f6;
			box-shadow: 0 0 8px rgba(59, 130, 246, 0.6);
			background: rgba(255, 255, 255, 0.2);
			color: #fff;
		}

		/* ✅ DROPDOWN FIX */
		.form-select option {
			background: #fff;
			color: #000;
		}

		/* ✅ DATE ICON */
		input[type="date"]::-webkit-calendar-picker-indicator {
			filter: invert(1);
			cursor: pointer;
		}

		textarea.form-control {
			height: auto;
		}

		/* ✅ BUTTON SIZE */
		.btn-equal {
			width: 120px;
		}

		/* ✅ SUCCESS MESSAGE */
		#successMsg {
			font-size: 16px;
			font-weight: bold;
			color: #155724;
			background-color: #d4edda;
			border-left: 5px solid green;
			border-radius: 10px;
			padding: 10px;
			position: relative;
			z-index: 5;
		}
	</style>
</head>

<body>

	<div class="container">
		<div class="card">

			<div class="card-header">
				Patient Registration
			</div>

			<div class="card-body">

				<!-- ✅ SUCCESS MESSAGE -->
				<div th:if="${message}" id="successMsg" class="text-center shadow-sm mb-3">
					<span th:text="${message}"></span>
				</div>

				<form th:action="@{/patient/save}" th:object="${patient}" method="post">

					<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

					<div class="row g-3">

						<div class="col-md-3">
							<label>First Name</label>
							<input type="text" th:field="*{firstName}" class="form-control"
								placeholder="Enter First Name">
						</div>

						<div class="col-md-3">
							<label>Middle Name</label>
							<input type="text" th:field="*{middleName}" class="form-control"
								placeholder="Enter Middle Name">
						</div>

						<div class="col-md-3">
							<label>Last Name</label>
							<input type="text" th:field="*{lastName}" class="form-control"
								placeholder="Enter Last Name">
						</div>

						<div class="col-md-3">
							<label>Gender</label>
							<select th:field="*{gender}" class="form-select">
								<option value="">Select Gender</option>
								<option value="Male">Male</option>
								<option value="Female">Female</option>
								<option value="Other">Other</option>
							</select>
						</div>

						<div class="col-md-3">
							<label>Date of Birth</label>
							<input type="date" th:field="*{dateOfBirth}" class="form-control"
								placeholder="Select Date of Birth">
						</div>

						<div class="col-md-3">
							<label>Marital Status</label>
							<select th:field="*{maritalStatus}" class="form-select">
								<option value="">Select Marital Status</option>
								<option value="Single">Single</option>
								<option value="Married">Married</option>
							</select>
						</div>

						<div class="col-md-3">
							<label>Aadhaar</label>
							<input type="text" th:field="*{aadhaarNo}" class="form-control"
								placeholder="Enter 12-digit Aadhaar Number">
						</div>

						<div class="col-md-3">
							<label>Blood Group</label>
							<select th:field="*{bloodGroup}" class="form-select">
								<option value="">Select Blood Group</option>
								<option value="A+">A+</option>
								<option value="A-">A-</option>
								<option value="B+">B+</option>
								<option value="B-">B-</option>
								<option value="AB+">AB+</option>
								<option value="AB-">AB-</option>
								<option value="O+">O+</option>
								<option value="O-">O-</option>

							</select>
						</div>

						<div class="col-md-3">
							<label>Nationality</label>
							<input type="text" th:field="*{nationality}" class="form-control"
								placeholder="Enter Nationality">
						</div>

						<div class="col-md-3">
							<label>Mobile</label>
							<input type="text" th:field="*{mobileNo}" class="form-control"
								placeholder="Enter Mobile Number">
						</div>

						<div class="col-md-3">
							<label>Email</label>
							<input type="email" th:field="*{email}" class="form-control"
								placeholder="Enter Email Address">
						</div>

						<div class="col-md-3">
							<label>Religion</label>
							<input type="text" th:field="*{religion}" class="form-control" placeholder="Enter Religion">
						</div>

						<div class="col-md-3">
							<label>Diseases</label>
							<input type="text" th:field="*{diseases}" class="form-control"
								placeholder="Enter Diseases (if any)">
						</div>

						<div class="col-md-3">
							<label>Medical History</label>
							<select th:field="*{medicalHistory}" class="form-select">
								<option value="">Select Medical History</option>

								<!-- Common Conditions -->
								<option value="Diabetes">Diabetes</option>
								<option value="Hypertension">Hypertension (BP)</option>
								<option value="Asthma">Asthma</option>
								<option value="Heart Disease">Heart Disease</option>
								<option value="Kidney Disease">Kidney Disease</option>
								<option value="Liver Disease">Liver Disease</option>

								<!-- Serious Conditions -->
								<option value="Cancer">Cancer</option>
								<option value="Stroke">Stroke</option>
								<option value="Thyroid Disorder">Thyroid Disorder</option>

								<!-- Lifestyle / Chronic -->
								<option value="Obesity">Obesity</option>
								<option value="Allergy">Allergy</option>
								<option value="Arthritis">Arthritis</option>

								<!-- Infectious -->
								<option value="Tuberculosis">Tuberculosis (TB)</option>
								<option value="Hepatitis">Hepatitis</option>
								<option value="HIV">HIV</option>

								<!-- Other -->
								<option value="None">None</option>
								<option value="Other">Other</option>
							</select>
						</div>

						<div class="col-md-3">
							<label>History</label>
							<input type="text" th:field="*{history}" class="form-control"
								placeholder="Enter Medical History Details">
						</div>

						<div class="col-md-3">
							<label>Ward No</label>
							<input type="number" th:field="*{wardNo}" class="form-control"
								placeholder="Enter Ward Number">
						</div>

						<div class="col-md-3">
							<label>Room No</label>
							<input type="number" th:field="*{roomNo}" class="form-control"
								placeholder="Enter Room Number">
						</div>

						<div class="col-md-3">
							<label>Bill Amount</label>
							<input type="number" step="0.01" th:field="*{billAmount}" class="form-control"
								placeholder="Enter Bill Amount">
						</div>

						<div class="col-md-3">
							<label>Note</label>
							<input type="text" th:field="*{note}" class="form-control" placeholder="Enter Notes">
						</div>

						<div class="col-md-3">
							<label>Address</label>
							<textarea th:field="*{address}" class="form-control"
								placeholder="Enter Full Address"></textarea>
						</div>

						<div class="col-md-3">
							<label>Block</label>
							<input type="text" th:field="*{block}" class="form-control" placeholder="Enter Block">
						</div>

						<div class="col-md-3">
							<label>District</label>
							<input type="text" th:field="*{district}" class="form-control" placeholder="Enter District">
						</div>

						<div class="col-md-3">
							<label>State</label>
							<input type="text" th:field="*{state}" class="form-control" placeholder="Enter State">
						</div>

						<div class="col-md-3">
							<label>Country</label>
							<input type="text" th:field="*{country}" class="form-control" placeholder="Enter Country">
						</div>

					</div>

			</div>

			<div class="d-flex justify-content-center gap-3 mt-4">
				<button class="btn btn-primary btn-equal">Register</button>
				<button type="reset" class="btn btn-secondary btn-equal">Reset</button>
			</div>

			</form>

		</div>
	</div>
	</div>

	<script>
		setTimeout(function () {
			let message = document.getElementById("successMsg");
			if (message) {
				message.style.transition = "opacity 0.5s ease";
				message.style.opacity = "0";
				setTimeout(() => message.style.display = "none", 500);
			}
		}, 3000);
	</script>

</body>

</html>
