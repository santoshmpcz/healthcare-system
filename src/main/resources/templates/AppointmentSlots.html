<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>Slots Result</title>

	<meta name="viewport" content="width=device-width, initial-scale=1">

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

	<style>
		/* ================= BACKGROUND ================= */
		body {
			font-family: 'Segoe UI', sans-serif;
			margin: 0;
			min-height: 100vh;

			background:
				linear-gradient(rgba(13, 110, 253, 0.3), rgba(110, 168, 254, 0.3)),
				url('/images/AavyaShah.png');

			background-size: cover;
			background-position: center;
			background-attachment: fixed;
		}

		/* ================= MAIN CONTAINER ================= */
		.main-container {
			background: rgba(255, 255, 255, 0.2);
			backdrop-filter: blur(10px);
			-webkit-backdrop-filter: blur(10px);

			border-radius: 20px;
			padding: 35px;

			margin: 1in;
			max-width: calc(100% - 2in);
			border: 2px solid #0d6efd;
		}

		/* ================= HEADER ================= */
		.page-header h1 {
			font-size: 40px;
			font-weight: 700;
			color: #ffffff;
		}

		.page-header p {
			color: #e0e0e0;
		}

		/* ================= DOCTOR ================= */
		.doctor-title small {
			color: #e0e0e0;
		}

		.doctor-title h2 {
			font-weight: 700;
			color: #0d6efd;
			/* ✅ BLUE DOCTOR NAME */
		}

		/* ================= TABLE CARD ================= */
		.table-card {
			background: rgba(255, 255, 255, 0.15);
			backdrop-filter: blur(10px);
			-webkit-backdrop-filter: blur(10px);

			border-radius: 20px;
			overflow: hidden;
			box-shadow: 0 5px 18px rgba(0, 0, 0, 0.1);
		}

		/* REMOVE BOOTSTRAP BACKGROUND */
		.table {
			background: transparent !important;
		}

		table {
			width: 100%;
		}

		th,
		td {
			text-align: center;
			vertical-align: middle !important;
			padding: 18px 10px;
		}

		/* ================= THEAD ================= */
		thead {
			background: transparent;
			color: #ffffff;
		}

		thead th {
			font-weight: 600;
			border: none;
		}

		/* ================= TABLE BODY ================= */
		.table tbody tr {
			background: rgba(255, 255, 255, 0.15) !important;
			backdrop-filter: blur(6px);
		}

		.table tbody tr:hover {
			background: rgba(255, 255, 255, 0.25) !important;
		}

		.table td,
		.table th {
			background: transparent !important;
			border-color: rgba(255, 255, 255, 0.3);
			color: #ffffff;
		}

		/* ================= SUB TEXT ================= */
		.date-sub,
		.slot-label,
		.fee-label {
			color: #dcdcdc;
		}

		td>span {
			display: block;
			line-height: 1.4;
		}

		/* ================= STATUS ================= */
		.badge-available {
			display: inline-block;
			background: rgba(230, 247, 238, 0.8);
			color: #1ca64c;
			padding: 6px 12px;
			border-radius: 20px;
			font-size: 14px;
			font-weight: 500;
		}

		/* ================= BUTTON ================= */
		.btn-book {
			background: linear-gradient(135deg, #0d6efd, #4dabf7);
			border-radius: 10px;
			color: white;
			padding: 8px 18px;
			border: none;
		}

		.btn-book:hover {
			opacity: 0.9;
		}

		/* ================= FEATURES ================= */
		.features {
			background: rgba(255, 255, 255, 0.15);
			backdrop-filter: blur(10px);
			-webkit-backdrop-filter: blur(10px);

			margin-top: 25px;
			border-radius: 20px;
			padding: 25px;

			display: flex;
			justify-content: space-around;
			flex-wrap: wrap;
			gap: 20px;
			text-align: center;
		}

		.feature i {
			font-size: 28px;
			margin-bottom: 8px;
		}

		.feature-title {
			font-weight: 600;
			color: #ffffff;
		}

		.feature small {
			color: #dcdcdc;
		}
	</style>

</head>

<body>

	<!-- HEADER -->
	<th:block th:replace="~{fragments/commonui :: header}"></th:block>
	<th:block th:replace="~{fragments/commonuser :: menu}"></th:block>

	<div class="main-container">

		<!-- PAGE HEADER -->
		<div class="page-header">
			<h1>Slots Result</h1>
			<p>Manage and view available appointment slots</p>
		</div>

		<!-- DOCTOR NAME -->
		<div class="doctor-title mb-4">
			<h4><small>Slots for</small></h4>
			<h2 th:text="${doctorName}"></h2>
		</div>

		<!-- TABLE -->
		<div class="table-card">
			<table class="table mb-0">
				<thead>
					<tr>
						<th>#</th>
						<th>Date</th>
						<th>Day</th>
						<th>No. of Slots</th>
						<th>Fee</th>
						<th>Status</th>
						<th>Action</th>
					</tr>
				</thead>

				<tbody>
					<tr th:each="ob,i : ${page != null ? page.content : {}}">
						<td class="fw-bold text-success" th:text="${i.count}"></td>

						<td>
							<span class="date-main" th:text="${#temporals.format(ob.date,'dd-MMM-yyyy')}"></span>
						</td>

						<td th:text="${#temporals.format(ob.date,'EEEE')}"></td>

						<td>
							<span class="slot-count" th:text="${ob.noOfSlots}"></span>
							
						</td>

						<td>
							<span class="fee"
								th:text="|₹ ${#numbers.formatDecimal(ob.fee,1,'COMMA',0,'POINT')}|"></span>
							
						</td>

						<td>
							<span class="badge-available"
								th:if="${ob.status != null and ob.status.name()=='AVAILABLE'}">
								● Available
							</span>
						</td>

						<td>
							<form th:if="${ob.status != null and ob.status.name()=='AVAILABLE'}"
								th:action="@{/slots/book}" method="post">
								<input type="hidden" name="appid" th:value="${ob.id}" />
								<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

								<button class="btn-book">
									<i class="fa-solid fa-calendar-check"></i> Book
								</button>
							</form>
						</td>
					</tr>

					<tr th:if="${page == null or #lists.isEmpty(page.content)}">
						<td colspan="7" class="text-danger py-4">
							No Slots Available
						</td>
					</tr>

				</tbody>
			</table>
		</div>

		<!-- FEATURES -->
		<div class="features">
			<div class="feature">
				<i class="fa-solid fa-shield-heart text-success"></i>
				<div class="feature-title">Trusted & Secure</div>
				<small>Your health is our priority</small>
			</div>

			<div class="feature">
				<i class="fa-solid fa-clock text-primary"></i>
				<div class="feature-title">Save Time</div>
				<small>Quick & easy booking</small>
			</div>

			<div class="feature">
				<i class="fa-solid fa-heart-pulse text-danger"></i>
				<div class="feature-title">Better Care</div>
				<small>Expert doctors</small>
			</div>

			<div class="feature">
				<i class="fa-solid fa-thumbs-up text-warning"></i>
				<div class="feature-title">24/7 Support</div>
				<small>We are here for you</small>
			</div>
		</div>

	</div>

</body>

</html>
