<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">

	<title>Specialization Data</title>

	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

	<style>
		body {
			font-family: 'Segoe UI', sans-serif;
			background: url('/images/AavyaShah.png') no-repeat center center fixed;
			background-size: cover;
			min-height: 100vh;
		}

		.glass-card {
			background: rgba(255, 255, 255, 0.55);
			backdrop-filter: blur(10px);
			border-radius: 18px;
			padding: 25px;
			box-shadow: 0 8px 25px rgba(0, 0, 0, 0.12);
		}

		.page-title {
			color: #fff;
			font-weight: 700;
		}

		.page-subtitle {
			color: rgba(255, 255, 255, 0.85);
			font-size: 14px;
		}

		.toolbar {
			display: flex;
			justify-content: space-between;
			align-items: center;
			flex-wrap: wrap;
			gap: 12px;
			margin-bottom: 18px;
		}

		/* SEARCH BOX */
		.search-wrapper {
			position: relative;
		}

		.search-wrapper i {
			position: absolute;
			left: 14px;
			top: 50%;
			transform: translateY(-50%);
			color: #6c757d;
		}

		.search-box {
			height: 42px;
			border-radius: 25px;
			padding-left: 38px;
			min-width: 240px;
			border: 1px solid #d0d7e2;
			background: #f8fafc;
			transition: all 0.2s ease;
		}

		.search-box:focus {
			background: #fff;
			border-color: #2563eb;
			box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
		}

		/* BUTTONS */
		.filter-btn,
		.reset-btn {
			height: 42px;
			border-radius: 25px;
			padding: 0 16px;
			display: flex;
			align-items: center;
			gap: 6px;
			font-weight: 500;
			transition: all 0.2s ease;
		}

		/* PRIMARY FILTER BUTTON */
		.filter-btn {
			background: #2563eb;
			color: #fff;
			border: none;
		}

		.filter-btn:hover {
			background: #1e40af;
		}

		/* RESET BUTTON (NEUTRAL) */
		.reset-btn {
			background: #f1f5f9;
			color: #374151;
			border: 1px solid #d1d5db;
		}

		.reset-btn:hover {
			background: #e2e8f0;
		}

		.table {
			background: rgba(255, 255, 255, 0.7);
		}

		.table thead {
			background: rgba(224, 231, 255, 0.95);
			color: #1e3a8a;
		}

		.spec-badge {
			border-radius: 50px;
			padding: 7px 14px;
			color: #fff;
			font-size: 13px;
			display: inline-flex;
			align-items: center;
			gap: 6px;
			font-weight: 600;
		}

		.action-btn {
			width: 36px;
			height: 36px;
			border-radius: 50%;
			display: inline-flex;
			align-items: center;
			justify-content: center;
			border: 1px solid;
			margin: 2px;
			background: rgba(255, 255, 255, 0.7);
		}

		.edit-btn {
			color: #f59e0b;
			border-color: #f59e0b;
		}

		.edit-btn:hover {
			background: #f59e0b;
			color: #fff;
		}

		.delete-btn {
			color: #ef4444;
			border-color: #ef4444;
		}

		.delete-btn:hover {
			background: #ef4444;
			color: #fff;
		}

		.pagination .page-link {
			border-radius: 8px;
			margin: 0 3px;
			border: none;
		}

		.pagination .active .page-link {
			background: #2563eb;
			color: white;
		}
	</style>
</head>

<body>

	<div th:replace="fragments/commonui :: header"></div>
	<div th:replace="fragments/commonuser :: menu"></div>

	<div class="container mt-4 mb-4">

		<div class="glass-card">

			<!-- HEADER -->
			<div class="d-flex justify-content-between align-items-center mb-3 flex-wrap">
				<div>
					<h3 class="page-title">Specialization Data</h3>
					<div class="page-subtitle">Manage medical specializations</div>
				</div>

				<a th:href="@{/spec/register}" class="btn btn-primary rounded-pill px-4">
					<i class="fa fa-plus"></i> Add Specialization
				</a>
			</div>

			<!-- TOOLBAR -->
			<div class="toolbar">

				<div class="d-flex gap-2">
					<a th:href="@{/spec/excel}" class="btn btn-outline-success">
						<i class="fa fa-file-excel"></i> Excel
					</a>

					<a th:href="@{/spec/pdf}" class="btn btn-outline-danger">
						<i class="fa fa-file-pdf"></i> PDF
					</a>
				</div>

				<form th:action="@{/spec/all}" method="get" class="d-flex align-items-center gap-2">

					<div class="search-wrapper">
						<input type="text" name="keyword" th:value="${keyword}" class="form-control search-box"
							placeholder="Search specializations...">
					</div>

					<button type="submit" class="filter-btn">
						<i class="fa fa-filter"></i> Filter
					</button>

					<a th:href="@{/spec/all}" class="reset-btn">
						<i class="fa fa-rotate-left"></i> Reset
					</a>

				</form>

			</div>

			<!-- TABLE -->
			<div class="table-wrapper">
				<table class="table table-hover text-center align-middle">

					<thead>
						<tr>
							<th>ID</th>
							<th>SPEC CODE</th>
							<th>SPECIALIZATION</th>
							<th>SPEC NOTE</th>
							<th>ACTIONS</th>
						</tr>
					</thead>

					<tbody>
						<tr th:if="${list == null or #lists.isEmpty(list)}">
							<td colspan="5" class="text-muted">No Records Found</td>
						</tr>

						<tr th:each="ob : ${list}">
							<td th:text="${ob.id}"></td>
							<td th:text="${ob.specCode}"></td>

							<td>
								<span class="spec-badge" th:style="'background:' + ${ob.color}">
									<i th:class="${ob.icon}"></i>
									<span th:text="${ob.specName}"></span>
								</span>
							</td>

							<td th:text="${ob.specNote}"></td>

							<td>
								<a th:href="@{/spec/edit(id=${ob.id})}" class="action-btn edit-btn">
									<i class="fa fa-pencil"></i>
								</a>

								<a th:href="@{/spec/delete(id=${ob.id})}" class="action-btn delete-btn"
									onclick="return confirm('Delete this record?');">
									<i class="fa fa-trash"></i>
								</a>
							</td>
						</tr>
					</tbody>

				</table>
			</div>

			<!-- ✅ PAGINATION -->
			<nav th:if="${page != null && page.totalPages > 1}">
				<ul class="pagination justify-content-center mt-4">

					<!-- PREVIOUS -->
					<li class="page-item" th:classappend="${!page.hasPrevious()} ? 'disabled'">
						<a class="page-link" th:href="@{/spec/all(page=${page.number-1}, keyword=${keyword})}">
							<i class="fa fa-chevron-left"></i>
						</a>
					</li>

					<!-- PAGE NUMBERS -->
					<th:block th:each="i : ${#numbers.sequence(0, page.totalPages - 1)}">
						<li class="page-item" th:classappend="${i == page.number} ? 'active'">
							<a class="page-link" th:href="@{/spec/all(page=${i}, keyword=${keyword})}"
								th:text="${i + 1}">
							</a>
						</li>
					</th:block>

					<!-- NEXT -->
					<li class="page-item" th:classappend="${!page.hasNext()} ? 'disabled'">
						<a class="page-link" th:href="@{/spec/all(page=${page.number+1}, keyword=${keyword})}">
							<i class="fa fa-chevron-right"></i>
						</a>
					</li>

				</ul>
			</nav>

		</div>
	</div>

</body>

</html>
