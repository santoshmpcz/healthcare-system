<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org">

<head>
	<title>Specialization Data</title>

	<!-- Bootstrap + Icons -->
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

	<style>
		/* ===== BACKGROUND ===== */
		body {
			font-family: 'Segoe UI', sans-serif;
			background: url('/images/AavyaShah.png') no-repeat center center fixed;
			background-size: cover;
		}

		/* ===== GLASS CARD (MORE TRANSPARENT) ===== */
		.glass-card {
			background: rgba(255, 255, 255, 0.55);
			backdrop-filter: blur(10px);
			border-radius: 16px;
			box-shadow: 0 8px 25px rgba(0, 0, 0, 0.08);
			padding: 25px;
		}

		/* ===== HEADER ===== */
		.page-title {
			color: #ffffff;
		}

		.page-subtitle {
			color: rgba(255, 255, 255, 0.7);
		}
		/* ===== TOOLBAR ===== */
		.toolbar {
			display: flex;
			justify-content: space-between;
			align-items: center;
			margin-bottom: 20px;
			flex-wrap: wrap;
			gap: 10px;
		}

		.search-box {
			border-radius: 30px;
			padding-left: 40px;
		}

		.search-wrapper {
			position: relative;
		}

		.search-wrapper i {
			position: absolute;
			top: 10px;
			left: 12px;
			color: gray;
		}

		/* ===== TABLE (TRANSPARENT) ===== */
		.table {
			border-radius: 12px;
			overflow: hidden;
			background: rgba(255, 255, 255, 0.6);
			backdrop-filter: blur(6px);
		}

		.table thead {
			background: rgba(224, 231, 255, 0.9);
			color: #1e3a8a;
		}

		.table tbody tr {
			transition: 0.2s;
		}

		.table tbody tr:hover {
			background: rgba(241, 245, 249, 0.7);
			transform: scale(1.01);
		}

		/* ===== BADGE ===== */
		.spec-badge {
			border-radius: 999px;
			padding: 6px 14px;
			color: #fff;
			font-size: 13px;
			display: inline-flex;
			align-items: center;
			gap: 6px;
		}

		/* ===== ACTION ICON BUTTONS ===== */
		.action-btn {
			width: 35px;
			height: 35px;
			border-radius: 50%;
			display: inline-flex;
			align-items: center;
			justify-content: center;
			border: 1px solid;
			margin: 2px;
			transition: 0.2s;
			background: rgba(255, 255, 255, 0.6);
		}

		.edit-btn {
			color: #f59e0b;
			border-color: #f59e0b;
		}

		.edit-btn:hover {
			background: #f59e0b;
			color: white;
		}

		.delete-btn {
			color: #ef4444;
			border-color: #ef4444;
		}

		.delete-btn:hover {
			background: #ef4444;
			color: white;
		}

		/* ===== PAGINATION ===== */
		.pagination .page-link {
			border-radius: 8px;
			margin: 0 3px;
			background: rgba(255, 255, 255, 0.7);
		}

		.pagination .active .page-link {
			background: #2563eb;
			border-color: #2563eb;
			color: white;
		}
	</style>

</head>

<body>

	<!-- HEADER -->
	<div th:replace="~{fragments/commonui :: header}"></div>

	<!-- MENU -->
	<div th:replace="~{fragments/commonuser :: menu}"></div>

	<div class="container mt-4">

		<div class="glass-card">

			<!-- ===== TITLE ===== -->
			<div class="d-flex justify-content-between align-items-center mb-3 flex-wrap">
				<div>
					<h3 class="page-title">Specialization Data</h3>
					<small class="text-muted">Manage medical specializations</small>
				</div>

				<a href="/spec/register" class="btn btn-primary rounded-pill">
					<i class="fa fa-plus"></i> Add Specialization
				</a>
			</div>

			<!-- ===== TOOLBAR ===== -->
			<div class="toolbar">

				<!-- LEFT -->
				<div>
					<a th:href="@{/spec/excel}" class="btn btn-outline-success">
						<i class="fa fa-file-excel"></i> Excel
					</a>

					<a th:href="@{/spec/pdf}" class="btn btn-outline-danger">
						<i class="fa fa-file-pdf"></i> PDF
					</a>
				</div>

				<!-- RIGHT -->
				<div class="d-flex gap-2">

					<div class="search-wrapper">
						<i class="fa fa-search"></i>
						<input type="text" class="form-control search-box" placeholder="Search...">
					</div>

					<button class="btn btn-outline-secondary">
						<i class="fa fa-filter"></i> Filter
					</button>

				</div>

			</div>

			<!-- ===== TABLE ===== -->
			<table class="table table-hover align-middle text-center">

				<thead>
					<tr>
						<th>ID</th>
						<th>SPEC CODE</th>
						<th>SPECIALIZATION</th>
						<th>SPEC NOTE</th>
						<th>ACTIONS</th>
					</tr>
				</thead>

				<tbody>

					<tr th:each="ob : ${list}">
						<td th:text="${ob.id}"></td>
						<td th:text="${ob.specCode}"></td>

						<td>
							<span class="spec-badge" th:style="'background:' + ${ob.color}">
								<i th:class="${ob.icon}"></i>
								<span th:text="${ob.specName}"></span>
							</span>
						</td>

						<td th:text="${ob.specNote}"></td>

						<td>
							<a th:href="@{/spec/edit(id=${ob.id})}" class="action-btn edit-btn" title="Edit">
								<i class="fa fa-pencil"></i>
							</a>

							<a th:href="@{/spec/delete(id=${ob.id})}" class="action-btn delete-btn" title="Delete">
								<i class="fa fa-trash"></i>
							</a>
						</td>
					</tr>

				</tbody>
			</table>

			<!-- ===== PAGINATION ===== -->
			<nav th:if="${page != null}">
				<ul class="pagination justify-content-center mt-3">

					<li class="page-item" th:if="${page.hasPrevious()}">
						<a class="page-link" th:href="@{/spec/all(page=${page.number-1})}">
							<i class="fa fa-chevron-left"></i>
						</a>
					</li>

					<th:block th:each="i : ${#numbers.sequence(0,page.totalPages-1)}">
						<li class="page-item" th:classappend="${i==page.number}? 'active'">
							<a class="page-link" th:href="@{/spec/all(page=${i})}">
								[[${i+1}]]
							</a>
						</li>
					</th:block>

					<li class="page-item" th:if="${page.hasNext()}">
						<a class="page-link" th:href="@{/spec/all(page=${page.number+1})}">
							<i class="fa fa-chevron-right"></i>
						</a>
					</li>

				</ul>
			</nav>

		</div>

	</div>

</body>

</html>
