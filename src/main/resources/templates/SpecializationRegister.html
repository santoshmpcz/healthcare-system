<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>Specialization Register</title>

	<link rel="stylesheet" th:href="@{/css/bootstrap.min.css}" />
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" />

	<style>
		body {
			margin: 0;
			font-family: 'Segoe UI', sans-serif;
			min-height: 100vh;
			background: url('/images/AavyaShah.png') no-repeat center center fixed;
			background-size: cover;
			overflow-x: hidden;
		}

		.main-card {
			max-width: 700px;
			margin: 40px auto;
			border-radius: 30px;
			overflow: hidden;
			background: rgba(255, 255, 255, 0.45);
			backdrop-filter: blur(10px);
			-webkit-backdrop-filter: blur(10px);
			border: 2px solid #2f66ff;
			box-shadow: 0 15px 40px rgba(0, 0, 0, 0.12);
		}

		.header {
			padding: 18px 22px;
			background: transparent;
		}

		.header h2 {
			margin: 0;
			width: 100%;
			background: linear-gradient(90deg, #1216a9, #2f66ff);
			color: #ffffff;
			font-size: 24px;
			font-weight: 800;
			text-align: center;
			padding: 14px 20px;
			border-radius: 14px;
			letter-spacing: 0.3px;
			box-shadow: 0 4px 12px rgba(18, 22, 169, 0.18);
		}

		.form-area {
			padding: 45px 40px 35px;
			background: transparent;
		}

		/* LABEL BLUE + BOLD */
		.label-text {
			font-size: 16px;
			font-weight: 800;
			color: #0d47a1;
			margin-bottom: 8px;
		}

		.input-box {
			display: flex;
			align-items: center;
			border: 2px solid rgba(72, 132, 255, 0.6);
			border-radius: 14px;
			background: rgba(255, 255, 255, 0.65);
			margin-bottom: 20px;
			overflow: hidden;
			transition: 0.3s;
		}

		.input-box:hover,
		.input-box:focus-within {
			border-color: #2f66ff;
			box-shadow: 0 0 0 3px rgba(47, 102, 255, 0.15);
		}

		.input-icon {
			width: 55px;
			height: 55px;
			display: flex;
			align-items: center;
			padding: 0 12px;
		}

		.input-icon i {
			font-size: 18px;
			color: #2f66ff;
			font-weight: bold;
		}

		/* INPUT TEXT BLUE + BOLD */
		.form-control {
			background: transparent !important;
			border: none !important;
			box-shadow: none !important;
			color: #0d47a1 !important;
			font-size: 16px;
			font-weight: 700;
			height: 55px;
			padding-left: 12px;
		}

		/* PLACEHOLDER BLUE + BOLD */
		.form-control::placeholder {
			color: #1565c0 !important;
			opacity: 1;
			font-weight: 700;
		}

		.button-area {
			display: flex;
			justify-content: center;
			margin-top: 30px;
		}

		.submit-btn {
			background: linear-gradient(90deg, #17b84f, #27d463);
			border: none;
			padding: 14px 50px;
			border-radius: 10px;
			font-size: 15px;
			font-weight: 700;
			letter-spacing: 1px;
			color: #fff;
			box-shadow: 0 8px 20px rgba(39, 212, 99, 0.25);
			transition: 0.3s;
		}

		.submit-btn:hover {
			transform: translateY(-2px);
			box-shadow: 0 12px 28px rgba(39, 212, 99, 0.35);
		}

		.text-success {
			color: #0d47a1 !important;
			font-weight: 700;
			font-size: 14px;
			margin-top: 20px;
			text-align: center;
		}

		@media (max-width: 768px) {
			.main-card {
				margin: 20px;
			}

			.form-area {
				padding: 25px 20px;
			}

			.submit-btn {
				width: 100%;
			}
		}
	</style>
</head>

<body>

	<div th:replace="~{fragments/commonui :: header}"></div>
	<div th:replace="~{fragments/commonuser :: menu}"></div>

	<div class="container-fluid py-4">
		<div class="main-card">

			<div class="header">
				<h2>Specialization Register</h2>
			</div>

			<div class="form-area">

				<form th:action="@{/spec/save}" method="post" th:object="${specialization}">

					<div class="label-text">Spec Code</div>
					<div class="input-box">
						<div class="input-icon">
							<i class="bi bi-grid"></i>
						</div>
						<input type="text" th:field="*{specCode}" class="form-control"
							placeholder="Enter specialization code">
					</div>

					<div class="label-text">Specialization Name</div>
					<div class="input-box">
						<div class="input-icon">
							<i class="bi bi-heart-pulse"></i>
						</div>
						<input type="text" th:field="*{specName}" class="form-control"
							placeholder="Enter specialization name">
					</div>

					<div class="label-text">Note</div>
					<div class="input-box">
						<div class="input-icon">
							<i class="bi bi-journal-text"></i>
						</div>
						<input type="text" th:field="*{specNote}" class="form-control" placeholder="Enter note">
					</div>

					<div class="button-area">
						<button type="submit" class="submit-btn">SUBMIT</button>
					</div>

				</form>

				<div class="text-success" th:text="${message}"></div>

			</div>
		</div>
	</div>

</body>

</html>
