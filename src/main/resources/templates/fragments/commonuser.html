<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<!-- ================= HEADER FRAGMENT ================= -->

<head th:fragment="header">

	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">

	<!-- Bootstrap 4 CSS -->
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" />

	<!-- Font Awesome -->
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css" />

	<!-- jQuery -->
	<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

	<!-- Bootstrap JS -->
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>

	<style>
		.navbar {
			z-index: 9999;
		}

		.navbar-brand {
			font-size: 24px;
			font-weight: 700;
		}

		.nav-link {
			color: #fff !important;
			font-weight: 600;
			padding: 12px 16px !important;
		}

		.nav-link:hover {
			color: #ffc107 !important;
		}

		.dropdown-menu {
			border: none;
			border-radius: 10px;
			box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
		}

		.dropdown-item {
			padding: 10px 15px;
		}

		.dropdown-item:hover {
			background: #007bff;
			color: #fff;
		}

		.logout-btn {
			width: 100%;
			text-align: left;
			border: none;
			background: none;
		}
	</style>

</head>

<!-- ================= NAVBAR FRAGMENT ================= -->

<body>

	<nav th:fragment="menu" class="navbar navbar-expand-lg navbar-dark bg-secondary">

		<div class="container">

			<!-- Brand -->
			<a class="navbar-brand" th:href="@{/}">
				<i class="fa fa-heartbeat"></i> HealthCare
			</a>

			<!-- Mobile Toggle -->
			<button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarSupportedContent">
				<span class="navbar-toggler-icon"></span>
			</button>

			<!-- Navbar -->
			<div class="collapse navbar-collapse" id="navbarSupportedContent">

				<ul class="navbar-nav mr-auto">

					<!-- REGISTER -->
					<li class="nav-item dropdown" sec:authorize="isAnonymous()">

						<a class="nav-link dropdown-toggle" href="javascript:void(0)" id="registerDropdown"
							data-toggle="dropdown">

							REGISTER
						</a>

						<div class="dropdown-menu">

							<a class="dropdown-item" th:href="@{/patient/register}">
								Patient Registration
							</a>

							<a class="dropdown-item" th:href="@{/doctor/register}">
								Doctor Registration
							</a>

							<a class="dropdown-item" th:href="@{/admin/register}">
								Admin Registration
							</a>

						</div>
					</li>

					<!-- ADMIN -->
					<li class="nav-item dropdown">

						<a class="nav-link dropdown-toggle" href="javascript:void(0)" id="adminDropdown"
							data-toggle="dropdown">

							ADMIN
						</a>

						<div class="dropdown-menu">

							<!-- LOGIN -->
							<a class="dropdown-item" th:href="@{/user/login}" sec:authorize="isAnonymous()">
								LOGIN
							</a>

							<!-- DASHBOARD -->
							<a class="dropdown-item" th:href="@{/admin/dashboard}" sec:authorize="hasRole('ADMIN')">
								Dashboard
							</a>

							<!-- LOGOUT -->
							<form th:action="@{/logout}" method="post" sec:authorize="isAuthenticated()" class="m-0">

								<button type="submit" class="dropdown-item logout-btn">
									Logout
								</button>

							</form>

						</div>

					</li>

				</ul>

			</div>

		</div>

	</nav>

</body>

</html>
