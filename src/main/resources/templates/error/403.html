<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>403 - Access Denied</title>

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
	<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

	<style>
		body {
			height: 100vh;
			margin: 0;
			display: flex;
			justify-content: center;
			align-items: center;
			font-family: 'Segoe UI', sans-serif;

			/* Background Image */
			background: url('/images/AavyaShah.png') no-repeat center center/cover;
			position: relative;
		}

		/* Dark overlay */
		body::before {
			content: "";
			position: absolute;
			top: 0;
			left: 0;
			width: 100%;
			height: 100%;
			background: rgba(0, 0, 0, 0.55);
			z-index: 0;
		}

		.card-box {
			position: relative;
			z-index: 1;
			background: rgba(255, 255, 255, 0.15);
			backdrop-filter: blur(15px);
			border-radius: 20px;
			padding: 50px 40px;
			text-align: center;
			color: white;
			box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
			max-width: 420px;
			width: 100%;
		}

		.error-icon {
			font-size: 70px;
			color: #ff4d4d;
			margin-bottom: 20px;
		}

		.error-title {
			font-size: 36px;
			font-weight: bold;
			margin-bottom: 10px;
		}

		.error-subtitle {
			font-size: 16px;
			margin-bottom: 20px;
			color: #f1f1f1;
		}

		.error-message {
			font-size: 14px;
			color: #ffdede;
			font-weight: bold;
			margin-bottom: 25px;
		}

		.btn-custom {
			padding: 10px 25px;
			border-radius: 25px;
			border: none;
			font-weight: 600;
			background: #ff4d4d;
			color: white;
			transition: 0.3s;
			text-decoration: none;
		}

		.btn-custom:hover {
			background: #ff1a1a;
			transform: scale(1.05);
		}
	</style>
</head>

<body>

	<div class="card-box">

		<div class="error-icon">
			<i class="fas fa-lock"></i>
		</div>

		<div class="error-title">
			403 - Access Denied
		</div>

		<div class="error-subtitle">
			You are not authorized to access this page.
		</div>

		<!-- Safe Thymeleaf Message (NULL safe) -->
		<div class="error-message" th:if="${session.errorMessage != null}">
			<span th:text="${session.errorMessage}"></span>
		</div>

		<a href="/user/login" class="btn-custom">
			<i class="fas fa-sign-in-alt"></i> Go to Login
		</a>

	</div>

</body>

</html>
