<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

	<meta charset="UTF-8">
	<title>Doctors List</title>

	<th:block th:replace="~{fragments/commonui :: header}"></th:block>

	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

	<style>
		body {
			background: url('/images/santoshHospital.jpeg') no-repeat center center fixed;
			background-size: cover;
			font-family: 'Segoe UI', sans-serif;
		}

		.header-bar {
			background: linear-gradient(to right, #1e3a8a, #2563eb);
			color: white;
			padding: 15px 20px;
			border-radius: 12px;
			display: flex;
			justify-content: space-between;
			align-items: center;
		}

		.header-title {
			display: flex;
			align-items: center;
			gap: 10px;
			font-size: 20px;
			font-weight: 600;
		}

		.header-right {
			display: flex;
			align-items: center;
			gap: 12px;
		}

		.search-box {
			border-radius: 30px;
			border: 1px solid #dcdcdc;
			padding: 10px 18px;
		}

		.sidebar {
			background: #fff;
			border-radius: 12px;
			padding: 20px;
			box-shadow: 0 6px 15px rgba(0, 0, 0, .08);
		}

		.card-grid {
			display: grid;
			grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
			gap: 22px;
		}

		.doctor-card {
			background: #fff;
			border-radius: 18px;
			box-shadow: 0 10px 25px rgba(0, 0, 0, .08);
			overflow: hidden;
			transition: .3s;
		}

		.doctor-card:hover {
			transform: translateY(-5px);
		}

		.img-box {
			height: 260px;
			overflow: hidden;
		}

		.doc-img {
			width: 100%;
			height: 100%;
			object-fit: cover;
			object-position: top;
		}

		.card-body {
			padding: 12px 14px;
		}

		.doc-name {
			font-weight: 600;
			font-size: 17px;
		}

		.meta {
			font-size: 14px;
			color: #555;
		}

		.card-footer {
			padding: 8px 12px;
			display: flex;
			justify-content: space-between;
		}

		.btn-pill {
			padding: 5px 12px;
			font-size: 13px;
			border-radius: 20px;
			border: none;
		}

		.btn-view {
			background: #e0ecff;
			color: #2563eb;
		}

		.btn-edit {
			background: #fff3cd;
			color: #d97706;
		}

		.btn-delete {
			background: #fee2e2;
			color: #dc2626;
		}

		.page-btn {
			margin: 3px;
			padding: 6px 12px;
			border: 1px solid #ccc;
			border-radius: 6px;
			text-decoration: none;
		}

		.page-active {
			background: #2563eb;
			color: white;
		}
	</style>
</head>

<body>

	<div th:replace="~{fragments/commonuser :: menu}"></div>

	<div class="container-fluid mt-3">

		<!-- SUCCESS -->
		<div th:if="${successMessage}" id="alertBox" class="alert alert-success text-center">
			<span th:text="${successMessage}"></span>
		</div>

		<!-- HEADER -->
		<div class="header-bar mb-3">

			<h4 class="header-title">
				<i class="fas fa-user-md"></i> Doctors List
			</h4>

			<div class="header-right">
				<form th:action="@{/doctor/all}" method="get">
					<input type="text" name="name" class="search-box" placeholder="Search doctor..." th:value="${name}">
				</form>
			</div>

		</div>

		<div class="row">

			<!-- SIDEBAR -->
			<div class="col-md-3">
				<div class="sidebar">

					<form th:action="@{/doctor/all}" method="get">

						<input type="hidden" name="name" th:value="${name}">

						<select name="specializationId" class="form-control mb-3" onchange="this.form.submit()">
							<option value="">All Specializations</option>
							<option th:each="s:${specList}" th:value="${s.id}" th:text="${s.specName}"
								th:selected="${s.id}==${specializationId}">
							</option>
						</select>

						<select name="experience" class="form-control mb-3" onchange="this.form.submit()">
							<option value="">Experience</option>
							<option value="1" th:selected="${experience==1}">1+ Years</option>
							<option value="5" th:selected="${experience==5}">5+ Years</option>
							<option value="10" th:selected="${experience==10}">10+ Years</option>
						</select>

						<input type="text" name="mobile" class="form-control mb-3" placeholder="Mobile"
							th:value="${mobile}" onchange="this.form.submit()">

						<input type="text" name="address" class="form-control mb-3" placeholder="Address"
							th:value="${address}" onchange="this.form.submit()">

						<a th:href="@{/doctor/all}" class="btn btn-danger w-100">
							Reset
						</a>

					</form>

					<!-- PAGINATION -->
					<div class="text-center mt-3">

						<a th:if="${currentPage>0}"
							th:href="@{/doctor/all(page=${currentPage-1},name=${name},specializationId=${specializationId},experience=${experience},mobile=${mobile},address=${address})}"
							class="page-btn">Prev</a>

						<span th:each="i:${#numbers.sequence(0,totalPages-1)}">
							<a th:href="@{/doctor/all(page=${i},name=${name},specializationId=${specializationId},experience=${experience},mobile=${mobile},address=${address})}"
								th:text="${i+1}" th:classappend="${i==currentPage}?'page-btn page-active':'page-btn'">
							</a>
						</span>

						<a th:if="${currentPage<totalPages-1}"
							th:href="@{/doctor/all(page=${currentPage+1},name=${name},specializationId=${specializationId},experience=${experience},mobile=${mobile},address=${address})}"
							class="page-btn">Next</a>

					</div>

				</div>
			</div>

			<!-- LIST -->
			<div class="col-md-9">

				<div class="card-grid">

					<div class="doctor-card" th:each="ob:${list}">

						<div class="img-box">
							<img class="doc-img"
								th:src="${ob.photo != null and ob.photo != ''} ? @{/doctor-images/{img}(img=${ob.photo})} : @{/images/no-image.png}"
								onerror="this.src='/images/no-image.png'">
						</div>

						<div class="card-body">

							<div class="doc-name"
								th:text="${ob.firstName + ' ' + (ob.lastName != null ? ob.lastName : '')}">
							</div>

							<div class="meta">
								Room: <span th:text="${ob.roomNo}"></span>
							</div>

							<div class="meta">
								Experience:
								<span th:text="${ob.experience != null ? ob.experience : 0}"></span> Years
							</div>

						</div>

						<div class="card-footer">

							<a th:href="@{/doctor/view(id=${ob.id})}" class="btn btn-pill btn-view">
								View
							</a>

							<a th:href="@{/doctor/edit(id=${ob.id})}" class="btn btn-pill btn-edit">
								Edit
							</a>

							<form th:action="@{/doctor/delete/{id}(id=${ob.id})}" method="post">
								<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
								<button class="btn btn-pill btn-delete">Delete</button>
							</form>

						</div>

					</div>

				</div>

			</div>

		</div>

	</div>

	<script>
		setTimeout(() => {
			const alertBox = document.getElementById('alertBox');
			if (alertBox) alertBox.style.display = 'none';
		}, 3000);
	</script>

</body>

</html>
