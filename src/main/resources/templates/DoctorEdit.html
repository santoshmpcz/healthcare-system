<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>Doctor Edit</title>

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

	<style>
		body {
			background: url('/images/AavyaShah.png') no-repeat center center fixed;
			background-size: cover;
			font-family: 'Segoe UI', sans-serif;
		}

		.topbar h2 {
			font-weight: 600;
			font-size: 28px;
			color: #0d6efd;
		}

		.subtitle {
			color: white;
			font-size: 14px;
			margin-bottom: 30px;
		}

		.main {
			width: 100%;
			padding: 40px 0;
			display: flex;
			justify-content: center;
		}

		.content-wrapper {
			max-width: 1100px;
			width: 100%;
			padding: 0 20px;
		}

		.card-box {
			background: rgba(255, 255, 255, 0.95);
			border-radius: 20px;
			padding: 40px;
			box-shadow: 0 25px 60px rgba(0, 0, 0, 0.08);
		}

		.profile-card {
			background: linear-gradient(135deg, #eaf1ff, #f4f8ff);
			border-radius: 20px;
			padding: 35px 25px;
			text-align: center;
		}

		.profile-img {
			width: 150px;
			height: 150px;
			border-radius: 50%;
			object-fit: cover;
			cursor: pointer;
		}

		.upload-btn {
			margin-top: 15px;
			background: #4e73df;
			color: white;
			border-radius: 10px;
			padding: 10px;
			cursor: pointer;
		}

		.section-title {
			font-weight: 600;
			font-size: 16px;
			margin-top: 25px;
		}

		label {
			font-size: 13px;
			font-weight: 500;
			margin-bottom: 4px;
		}

		.form-control,
		.form-select {
			border-radius: 10px;
		}

		.footer-btn {
			display: flex;
			justify-content: flex-end;
			gap: 10px;
			margin-top: 25px;
		}
	</style>
</head>

<body>

	<div th:replace="~{fragments/commonui :: header}"></div>
	<div th:replace="~{fragments/commonuser :: menu}"></div>

	<div class="main">
		<div class="content-wrapper">

			<div class="topbar">
				<h2><i class="fas fa-user-md"></i> Doctor Edit <i class="fas fa-stethoscope"></i></h2>
				<div class="subtitle">Update doctor information</div>
			</div>

			<div class="card-box">

				<form th:action="@{/doctor/update}" th:object="${doctor}" method="post" enctype="multipart/form-data">

					<!-- ✅ CSRF (VERY IMPORTANT) -->
					<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

					<!-- ✅ HIDDEN FIELDS -->
					<input type="hidden" th:field="*{id}">
					<input type="hidden" th:field="*{doctorCode}">
					<input type="hidden" th:field="*{photo}">

					<div class="row g-4">

						<!-- PROFILE -->
						<div class="col-md-4">
							<div class="profile-card">

								<img id="previewImg"
									th:src="${doctor.photo != null} ? @{/uploads/doctorImages/{img}(img=${doctor.photo})} : @{/images/no-image.png}"
									class="profile-img" onclick="document.getElementById('fileInput').click()">

								<h5 class="mt-2" th:text="*{firstName} + ' ' + *{lastName}"></h5>

								<div onclick="document.getElementById('fileInput').click()" class="upload-btn">
									<i class="fa fa-camera"></i> Upload Photo
								</div>

								<input type="file" id="fileInput" name="file" hidden onchange="previewImage(event)">
							</div>
						</div>

						<!-- FORM -->
						<div class="col-md-8">

							<!-- PERSONAL -->
							<div class="section-title">Personal Information</div>
							<div class="row g-3">

								<div class="col-md-6">
									<label>First Name</label>
									<input type="text" th:field="*{firstName}" class="form-control">
								</div>

								<div class="col-md-6">
									<label>Middle Name</label>
									<input type="text" th:field="*{middleName}" class="form-control">
								</div>

								<div class="col-md-6">
									<label>Last Name</label>
									<input type="text" th:field="*{lastName}" class="form-control">
								</div>

								<div class="col-md-6">
									<label>Email</label>
									<input type="email" th:field="*{email}" class="form-control">
								</div>

								<div class="col-md-6">
									<label>Mobile</label>
									<!-- ✅ FIXED -->
									<input type="text" th:field="*{mobile}" class="form-control">
								</div>

								<div class="col-md-6">
									<label>Gender</label>
									<select th:field="*{gender}" class="form-select">
										<option value="">Select Gender</option>
										<option value="Male">Male</option>
										<option value="Female">Female</option>
									</select>
								</div>

							</div>

							<!-- PROFESSIONAL -->
							<div class="section-title">Professional Information</div>
							<div class="row g-3">

								<div class="col-md-6">
									<label>Room No</label>
									<input type="number" th:field="*{roomNo}" class="form-control">
								</div>

								<div class="col-md-6">
									<label>Experience</label>
									<input type="number" th:field="*{experience}" class="form-control">
								</div>

								<div class="col-md-6">
									<label>Degree</label>
									<input type="text" th:field="*{degree}" class="form-control">
								</div>

								<div class="col-md-6">
									<label>Salary</label>
									<input type="number" th:field="*{salary}" class="form-control">
								</div>

								<div class="col-md-6">
									<label>Specialization</label>
									<select th:field="*{specializationId}" class="form-select">
										<option value="">Select</option>
										<option th:each="sp : ${specList}" th:value="${sp.id}" th:text="${sp.specName}">
										</option>
									</select>
								</div>

								<div class="col-md-6">
									<label>Note</label>
									<input type="text" th:field="*{note}" class="form-control">
								</div>

							</div>

							<!-- ADDRESS -->
							<div class="section-title">Address Information</div>
							<div class="row g-3">

								<div class="col-md-6">
									<label>Block</label>
									<input type="text" th:field="*{block}" class="form-control">
								</div>

								<div class="col-md-6">
									<label>District</label>
									<input type="text" th:field="*{district}" class="form-control">
								</div>

								<div class="col-md-6">
									<label>Country</label>
									<input type="text" th:field="*{country}" class="form-control">
								</div>

								<div class="col-md-6">
									<label>Full Address</label>
									<input type="text" th:field="*{address}" class="form-control">
								</div>

								<div class="col-md-6">
									<label>Hobbies</label>
									<input type="text" th:field="*{hobbies}" class="form-control">
								</div>

								<div class="col-md-6">
									<label>Nationality</label>
									<input type="text" th:field="*{nationality}" class="form-control">
								</div>

							</div>

							<!-- BUTTONS -->
							<div class="footer-btn">
								<a th:href="@{/doctor/all}" class="btn btn-outline-secondary">Cancel</a>
								<button type="submit" class="btn btn-primary">Update</button>
							</div>

						</div>

					</div>

				</form>

			</div>

		</div>
	</div>

	<script>
		function previewImage(event) {
			const reader = new FileReader();
			reader.onload = function () {
				document.getElementById('previewImg').src = reader.result;
			}
			reader.readAsDataURL(event.target.files[0]);
		}
	</script>

</body>

</html>
