<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>Doctor Edit</title>

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

	<style>
		body {
			background: linear-gradient(rgba(13, 110, 253, .08),
					rgba(13, 110, 253, .08)),
				url('/images/AavyaShah.png') no-repeat center fixed;
			background-size: cover;
			font-family: 'Segoe UI', sans-serif;
		}

		.main {
			padding: 25px 0;
			display: flex;
			justify-content: center;
		}

		.content-wrapper {
			max-width: 900px;
			width: 100%;
		}

		.card-box {
			background: rgba(255, 255, 255, .25);
			backdrop-filter: blur(14px);
			border-radius: 14px;
			padding: 22px;
			box-shadow: 0 8px 25px rgba(0, 0, 0, .1);
		}

		label {
			color: #fff;
			font-size: 12px;
		}

		.form-control,
		.form-select {
			background: transparent !important;
			color: #fff !important;
			border: 1px solid rgba(255, 255, 255, .5) !important;
		}

		.form-control::placeholder {
			color: rgba(255, 255, 255, .7);
		}

		.form-select option {
			color: black;
			background: white;
		}

		.profile-img {
			width: 110px;
			height: 110px;
			border-radius: 50%;
			object-fit: cover;
			cursor: pointer;
			border: 3px solid #fff;
		}

		.section-title {
			color: #fff;
			font-size: 13px;
			font-weight: 600;
			margin-top: 18px;
		}

		.footer-btn {
			display: flex;
			justify-content: flex-end;
			gap: 8px;
			margin-top: 20px;
		}

		.subtitle {
			color: #0d6efd;
		}
	</style>
</head>

<body>

	<div th:replace="~{fragments/commonui :: header}"></div>
	<div th:replace="~{fragments/commonuser :: menu}"></div>

	<div class="main">
		<div class="content-wrapper">

			<h3 class="text-white">
				<i class="fas fa-user-md"></i> Doctor Edit
			</h3>

			<div class="subtitle">Update doctor information</div>

			<div class="card-box">

				<form th:action="@{/doctor/update}" th:object="${doctor}" method="post" enctype="multipart/form-data">

					<input type="hidden" th:field="*{id}">
					<input type="hidden" th:field="*{doctorCode}">
					<input type="hidden" th:field="*{imageUrl}">

					<!-- ================= IMAGE ================= -->

					<div class="text-center mb-3">

						<label for="fileInput">

							<img id="previewImg" class="profile-img" th:src="${doctor.imageUrl != null and !#strings.isEmpty(doctor.imageUrl)}
	           ? ${doctor.imageUrl}
	           : @{/images/no-image.png}" onerror="this.src='/images/no-image.png'">

						</label>

						<div class="text-white" th:text="*{firstName} + ' ' + *{lastName}">
						</div>

						<label class="text-white mt-1" for="fileInput">
							<i class="fa fa-camera"></i> Change Photo
						</label>

						<input type="file" id="fileInput" name="file" hidden onchange="previewImage(event)">

					</div>

					<!-- ================= PERSONAL ================= -->

					<div class="section-title">Personal</div>

					<div class="row g-2">

						<div class="col-md-4">
							<label>First Name</label>
							<input th:field="*{firstName}" class="form-control">
						</div>

						<div class="col-md-4">
							<label>Middle Name</label>
							<input th:field="*{middleName}" class="form-control">
						</div>

						<div class="col-md-4">
							<label>Last Name</label>
							<input th:field="*{lastName}" class="form-control">
						</div>

						<div class="col-md-4">
							<label>Email</label>
							<input type="email" th:field="*{email}" class="form-control">
						</div>

						<div class="col-md-4">
							<label>Mobile</label>
							<input th:field="*{mobile}" class="form-control">
						</div>

						<div class="col-md-4">
							<label>Gender</label>
							<select th:field="*{gender}" class="form-select">
								<option value="">Select</option>
								<option value="Male">Male</option>
								<option value="Female">Female</option>
							</select>
						</div>

					</div>

					<!-- ================= PROFESSIONAL ================= -->

					<div class="section-title">Professional</div>

					<div class="row g-2">

						<div class="col-md-4">
							<label>Room No</label>
							<input type="number" th:field="*{roomNo}" class="form-control">
						</div>

						<div class="col-md-4">
							<label>Experience</label>
							<input type="number" th:field="*{experience}" class="form-control">
						</div>

						<div class="col-md-4">
							<label>Degree</label>
							<input th:field="*{degree}" class="form-control">
						</div>

						<div class="col-md-4">
							<label>Salary</label>
							<input type="number" th:field="*{salary}" class="form-control">
						</div>

						<!-- ✅ SPECIALIZATION FIX -->
						<div class="col-md-4">
							<label>Specialization</label>

							<select th:field="*{specializationId}" class="form-select">

								<option value="">-- Select Specialization --</option>

								<option th:each="sp : ${specList}" th:value="${sp.id}" th:text="${sp.specName}">
								</option>

							</select>
						</div>

						<div class="col-md-4">
							<label>Note</label>
							<input th:field="*{note}" class="form-control">
						</div>

					</div>

					<!-- ================= ADDRESS ================= -->

					<div class="section-title">Address</div>

					<div class="row g-2">

						<div class="col-md-4">
							<label>Block</label>
							<input th:field="*{block}" class="form-control">
						</div>

						<div class="col-md-4">
							<label>District</label>
							<input th:field="*{district}" class="form-control">
						</div>

						<div class="col-md-4">
							<label>Country</label>
							<input th:field="*{country}" class="form-control">
						</div>

						<div class="col-md-4">
							<label>Address</label>
							<input th:field="*{address}" class="form-control">
						</div>

						<div class="col-md-4">
							<label>Hobbies</label>
							<input th:field="*{hobbies}" class="form-control">
						</div>

						<div class="col-md-4">
							<label>Nationality</label>
							<input th:field="*{nationality}" class="form-control">
						</div>

					</div>

					<div class="footer-btn">
						<a th:href="@{/doctor/all}" class="btn btn-outline-light btn-sm">Cancel</a>
						<button class="btn btn-primary btn-sm">Update</button>
					</div>

				</form>
			</div>
		</div>
	</div>

	<script>
		function previewImage(event) {
			const file = event.target.files[0];
			if (!file) return;

			const reader = new FileReader();
			reader.onload = function () {
				document.getElementById("previewImg").src = reader.result;
			}
			reader.readAsDataURL(file);
		}
	</script>

</body>

</html>
