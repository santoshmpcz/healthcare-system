<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Patient Data</title>

	<th:block th:replace="~{fragments/commonui :: header}"></th:block>

	<style>
		body {
			margin: 0;
			font-family: Arial, Helvetica, sans-serif;
			background: url('/images/SantoshHospital.jpeg') center/cover no-repeat fixed;
		}

		.container-fluid {
			padding: 0;
			margin-top: 75px;
		}

		/* MAIN CARD */
		.main-card {
			border-radius: 22px;
			overflow: hidden;
			min-height: calc(100vh - 75px);
			background: rgba(20, 30, 90, .35);
			backdrop-filter: blur(18px);
			box-shadow: 0 0 40px rgba(0, 0, 0, .35);
		}

		/* HEADER + FOOTER */
		.header-footer {
			background: linear-gradient(90deg,
					rgba(30, 60, 200, .75),
					rgba(80, 120, 255, .55),
					rgba(30, 60, 200, .75));
			color: #fff;
			text-align: center;
			padding: 18px;
			font-weight: 800;
		}

		.header-footer h5 {
			margin: 0;
			font-size: 34px;
		}

		.content-area {
			padding: 20px;
		}

		/* MESSAGES */
		.success-msg {
			color: #00ff95;
			font-weight: 700;
			text-align: center;
		}

		.info-msg {
			color: #ffd54f;
			font-weight: 700;
			text-align: center;
		}

		.error-msg {
			color: #ff5252;
			font-weight: 700;
			text-align: center;
		}

		/* TABLE WRAPPER */
		.table-wrapper {
			background: rgba(255, 255, 255, .15);
			border-radius: 20px;
			padding: 20px;
			backdrop-filter: blur(25px);
			border: 2px solid #3c5aff;
		}

		/* REMOVE TABLE FORMAT */
		.table {
			border: none !important;
			background: transparent;
			border-collapse: separate;
			border-spacing: 0 12px;
		}

		.table thead th {
			background: transparent;
			color: #bcd4ff;
			font-weight: 700;
			border: none;
			text-align: left;
		}

		.table td {
			border: none !important;
			background: transparent;
			color: #fff;
		}

		/* CARD STYLE ROWS */
		.table tbody tr {
			background: rgba(255, 255, 255, .08);
			backdrop-filter: blur(12px);
			border-radius: 14px;
			transition: .3s;
		}

		.table tbody tr:hover {
			background: rgba(60, 90, 255, .25);
			transform: scale(1.01);
		}

		/* EMPTY DATA */
		.empty-data {
			text-align: center;
			color: #ff6b6b;
			font-weight: 700;
			padding: 25px;
		}
	</style>
</head>

<body>

	<th:block th:replace="~{fragments/commonuser :: menu}"></th:block>

	<div class="container-fluid">
		<div class="card main-card">

			<!-- HEADER -->
			<div class="header-footer">
				<h5>Patient Data</h5>
			</div>

			<div class="content-area">

				<div th:if="${successMessage}" id="successAlert" class="success-msg" th:text="${successMessage}"></div>

				<div th:if="${infoMessage}" id="infoAlert" class="info-msg" th:text="${infoMessage}"></div>

				<div th:if="${errorMessage}" id="errorAlert" class="error-msg" th:text="${errorMessage}"></div>

				<div th:if="${list == null or #lists.isEmpty(list)}" class="empty-data">
					No Patient Records Found
				</div>

				<!-- TABLE -->
				<div class="table-wrapper table-responsive" th:if="${list != null and !#lists.isEmpty(list)}">

					<table class="table align-middle">

						<thead>
							<tr>
								<th>#</th>
								<th>First</th>
								<th>Middle</th>
								<th>Last</th>
								<th>Gender</th>
								<th>DOB</th>
								<th>Marital</th>
								<th>Blood</th>
								<th>Aadhaar</th>
								<th>Email</th>
								<th>Mobile</th>
								<th>Diseases</th>
								<th>Ward</th>
								<th>Room</th>
								<th>Bill</th>
								<th>District</th>
								<th>State</th>
								<th>Country</th>
								<th>Medical</th>
								<th>Actions</th>
							</tr>
						</thead>

						<tbody>

							<tr th:each="ob, stat : ${list}">

								<td th:text="${currentPage * size + stat.count}"></td>
								<td th:text="${ob.firstName}"></td>
								<td th:text="${ob.middleName}"></td>
								<td th:text="${ob.lastName}"></td>
								<td th:text="${ob.gender}"></td>

								<td th:text="${ob.dateOfBirth != null ?
#temporals.format(ob.dateOfBirth,'dd-MM-yyyy') : ''}">
								</td>

								<td th:text="${ob.maritalStatus}"></td>
								<td th:text="${ob.bloodGroup}"></td>
								<td th:text="${ob.aadhaarNo}"></td>
								<td th:text="${ob.email}"></td>
								<td th:text="${ob.mobileNo}"></td>
								<td th:text="${ob.diseases}"></td>
								<td th:text="${ob.wardNo}"></td>
								<td th:text="${ob.roomNo}"></td>

								<td th:text="${ob.billAmount != null ?
#numbers.formatDecimal(ob.billAmount,1,2) : '0.00'}"></td>

								<td th:text="${ob.district}"></td>
								<td th:text="${ob.state}"></td>
								<td th:text="${ob.country}"></td>
								<td th:text="${ob.medicalHistory}"></td>

								<td class="text-center">

									<a th:href="@{/patient/edit(id=${ob.id})}" class="btn btn-info btn-sm">
										<i class="fa fa-pencil"></i>
									</a>

									<a th:href="@{/patient/delete(id=${ob.id})}" class="btn btn-danger btn-sm"
										onclick="return confirm('Are you sure you want to delete this patient?');">
										<i class="fa fa-trash"></i>
									</a>

								</td>

							</tr>

						</tbody>
					</table>
				</div>

				<!-- PAGINATION -->
				<nav class="mt-4" th:if="${totalPages != null and totalPages > 1}">
					<ul class="pagination justify-content-center">

						<li class="page-item" th:classappend="${currentPage == 0 ? 'disabled' : ''}">
							<a class="page-link" th:href="@{/patient/all(page=${currentPage-1},size=${size})}">
								Previous
							</a>
						</li>

						<li class="page-item" th:each="i : ${#numbers.sequence(0,totalPages-1)}"
							th:classappend="${i == currentPage ? 'active' : ''}">
							<a class="page-link" th:text="${i+1}" th:href="@{/patient/all(page=${i},size=${size})}">
							</a>
						</li>

						<li class="page-item" th:classappend="${currentPage+1 >= totalPages ? 'disabled' : ''}">
							<a class="page-link" th:href="@{/patient/all(page=${currentPage+1},size=${size})}">
								Next
							</a>
						</li>

					</ul>
				</nav>

			</div>

			<!-- FOOTER -->
			<div class="header-footer">
				© <span id="year"></span> Santosh Hospital
			</div>

		</div>
	</div>

	<script>
		document.getElementById("year").innerHTML = new Date().getFullYear();

		setTimeout(() => {
			["successAlert", "infoAlert", "errorAlert"].forEach(id => {
				let el = document.getElementById(id);
				if (el) {
					el.style.opacity = "0";
					setTimeout(() => el.style.display = "none", 800);
				}
			});
		}, 3000);
	</script>

</body>

</html>
