<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>Slot Booking Status</title>

	<th:block th:replace="~{fragments/commonui :: header}"></th:block>

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

	<style>
		/* ✅ BACKGROUND */
		body {
			font-family: 'Segoe UI', sans-serif;
			background:
				linear-gradient(rgba(15, 23, 42, 0.35), rgba(15, 23, 42, 0.35)),
				/* 🔥 reduced from 0.7 */
				url('/images/AavyaShah.png');
			background-size: cover;
			background-position: center;
			background-attachment: fixed;
			min-height: 100vh;
		}


		/* ✅ GLASS CARD */
		.status-card {
			max-width: 650px;
			margin: 60px auto;
			padding: 30px;
			border-radius: 18px;

			/* 🔥 more transparent */
			background: rgba(255, 255, 255, 0.05);

			/* 🔥 reduce blur */
			backdrop-filter: blur(10px);
			-webkit-backdrop-filter: blur(10px);

			border: 2px solid rgba(59, 130, 246, 0.8);

			box-shadow:
				0 10px 30px rgba(0, 0, 0, 0.25),
				0 0 15px rgba(59, 130, 246, 0.6);

			text-align: center;
			color: #fff;
		}


		/* ✅ 🔥 HEADER (MATCH IMAGE) */
		.status-header {
			display: inline-block;
			width: 100%;
			padding: 14px 20px;
			border-radius: 12px;

			font-size: 20px;
			font-weight: 600;
			text-align: center;
			color: #fff;

			background: linear-gradient(90deg, #1e3a8a, #3b82f6);

			box-shadow: 0 6px 20px rgba(59, 130, 246, 0.4);

			margin-bottom: 25px;
		}

		/* ✅ ICON */
		.success-icon {
			width: 90px;
			height: 90px;
			border-radius: 50%;
			background: rgba(255, 255, 255, 0.15);
			display: flex;
			align-items: center;
			justify-content: center;
			margin: 0 auto 20px;
		}

		.success-icon i {
			font-size: 36px;
			color: #22c55e;
		}

		.main-text {
			font-size: 20px;
			font-weight: 600;
			color: #22c55e;
			margin-bottom: 10px;
		}

		.sub-text {
			color: #e2e8f0;
			font-size: 14px;
			margin-bottom: 25px;
		}

		/* ✅ BUTTONS */
		.btn-custom {
			padding: 10px 22px;
			border-radius: 8px;
			font-size: 14px;
			font-weight: 500;
		}

		.btn-primary {
			background: #3b82f6;
			border: none;
		}

		.btn-success {
			background: #22c55e;
			border: none;
		}

		/* ✅ FOOTER */
		.footer-icons {
			display: flex;
			justify-content: space-between;
			margin-top: 30px;
			padding-top: 15px;
			border-top: none;

			font-size: 12px;
			color: #cbd5f5;
		}

		.footer-item {
			flex: 1;
			text-align: center;
		}

		.footer-item i {
			font-size: 18px;
			margin-bottom: 5px;
		}

		.footer-item b {
			display: block;
			color: #fff;
		}
	</style>
</head>

<body>

	<th:block th:replace="~{fragments/commonuser :: menu}"></th:block>

	<div class="status-card">

		<!-- ✅ HEADER -->
		<div class="status-header">
			Slot Booking Status
		</div>

		<div class="success-icon">
			<i class="fa-solid fa-check"></i>
		</div>

		<!-- SUCCESS -->
		<div th:if="${message != null}">
			<div class="main-text" th:text="${message}">
				You already requested this slot!
			</div>

			<div class="sub-text">
				Your slot booking request has been received successfully.<br>
				We will notify you soon.
			</div>
		</div>

		<!-- ERROR -->
		<div th:if="${message == null}">
			<div class="main-text text-danger">
				Something went wrong!
			</div>
			<div class="sub-text">
				Please try again later.
			</div>
		</div>

		<div class="mt-3">
			<a th:href="@{/user/home}" class="btn btn-primary btn-custom me-2">
				<i class="fa fa-home me-1"></i> Home
			</a>

			<a th:href="@{/slots/patient}" class="btn btn-success btn-custom">
				<i class="fa fa-clipboard-list me-1"></i> My Requests
			</a>
		</div>

		<div class="footer-icons">

			<div class="footer-item">
				<i class="fa-solid fa-shield-halved"></i>
				<b>Trusted</b>
			</div>

			<div class="footer-item">
				<i class="fa-solid fa-clock"></i>
				<b>Fast</b>
			</div>

			<div class="footer-item">
				<i class="fa-solid fa-heart-pulse"></i>
				<b>Care</b>
			</div>

			<div class="footer-item">
				<i class="fa-solid fa-headset"></i>
				<b>Support</b>
			</div>

		</div>

	</div>

</body>

</html>
